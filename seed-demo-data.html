      {

    function log(message) {
      const logDiv = document.getElementById('log');
      logDiv.textContent += `${new Date().toLocaleTimeString()} - ${message}\n`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }
    
    function showStatus(message, type = 'success') {
      const statusDiv = document.getElementById('status');
      statusDiv.className = type;
      statusDiv.innerHTML = `<strong>${type === 'success' ? '✅' : '❌'}</strong> ${message}`;
    }
    
    async function seedDemoData() {
      const btn = document.getElementById('seedBtn');
      btn.disabled = true;
      btn.textContent = 'Seeding...';
      
      document.getElementById('log').textContent = '';
      log('Starting demo data seeding...');
      
      let successCount = 0;
      let failCount = 0;
      
      for (const promo of demoPromotions) {
        try {
          const promotion = {
            url: promo.url,
            title: promo.title,
            description: promo.description,
            keywords: promo.keywords,
            timestamp: new Date().toISOString(),
            cost: promo.budget,
            budget: promo.budget,
            clicks: 0
          };
          
          const response = await fetch(`${FIRESTORE_URL}/promotions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              fields: {
                url: { stringValue: promotion.url },
                title: { stringValue: promotion.title },
                description: { stringValue: promotion.description },
                keywords: {
                  arrayValue: {
                    values: promotion.keywords.map(k => ({ stringValue: k }))
                  }
                },
                timestamp: { stringValue: promotion.timestamp },
                cost: { integerValue: promotion.cost.toString() },
                budget: { integerValue: promotion.budget.toString() },
                clicks: { integerValue: '0' }
              }
            })
          });
          
          if (response.ok) {
            successCount++;
            log(`✓ Added: ${promo.title}`);
          } else {
            failCount++;
            log(`✗ Failed: ${promo.title}`);
          }
          
          // Small delay to avoid rate limiting
          await new Promise(resolve => setTimeout(resolve, 100));
          
        } catch (error) {
          failCount++;
          log(`✗ Error adding ${promo.title}: ${error.message}`);
        }
      }
      
      log(`\nSeeding complete! Success: ${successCount}, Failed: ${failCount}`);
      showStatus(`Successfully seeded ${successCount} demo promotions!`, 'success');
      
      btn.disabled = false;
      btn.textContent = 'Seed 30 Demo Promotions';
    }
    
    async function clearAllPromotions() {
      if (!confirm('Are you sure you want to delete ALL promotions? This cannot be undone!')) {
        return;
      }
      
      const btn = document.getElementById('clearBtn');
      btn.disabled = true;
      btn.textContent = 'Clearing...';
      
      document.getElementById('log').textContent = '';
      log('Fetching all promotions...');
      
      try {
        const response = await fetch(`${FIRESTORE_URL}/promotions`);
        const data = await response.json();
        const documents = data.documents || [];
        
        log(`Found ${documents.length} promotions to delete`);
        
        let deleteCount = 0;
        for (const doc of documents) {
          try {
            const docId = doc.name.split('/').pop();
            await fetch(`${FIRESTORE_URL}/promotions/${docId}`, {
              method: 'DELETE'
            });
            deleteCount++;
            log(`✓ Deleted promotion ${deleteCount}/${documents.length}`);
            
            await new Promise(resolve => setTimeout(resolve, 50));
          } catch (error) {
            log(`✗ Error deleting: ${error.message}`);
          }
        }
        
        log(`\nClearing complete! Deleted ${deleteCount} promotions`);
        showStatus(`Successfully deleted ${deleteCount} promotions`, 'success');
        
      } catch (error) {
        log(`Error: ${error.message}`);
        showStatus(`Error: ${error.message}`, 'warning');
      }
      
      btn.disabled = false;
      btn.textContent = 'Clear All Promotions';
    }
    
    document.getElementById('seedBtn').addEventListener('click', seedDemoData);
    document.getElementById('clearBtn').addEventListener('click', clearAllPromotions);
