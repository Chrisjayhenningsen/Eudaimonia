<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 500px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
    }
    
    h1 {
      font-size: 24px;
      margin: 0 0 10px 0;
      color: #333;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    
    .systems-section {
      margin-bottom: 30px;
    }
    
    .systems-section h2 {
      font-size: 18px;
      margin: 0 0 15px 0;
      color: #51cf66;
    }
    
    .system-item {
      background: #f9f9f9;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 8px;
      border-left: 4px solid #51cf66;
    }
    
    .system-text {
      color: #333;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    
    .completion-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .completion-radio {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 10px 12px;
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      color: #333;
      transition: all 0.2s;
    }
    
    .completion-radio:hover {
      border-color: #4a9eff;
      background: #f9fbff;
    }
    
    .completion-radio.selected {
      border-color: #51cf66;
      background: #e8f5e9;
    }
    
    .completion-radio input[type="radio"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      margin: 0;
    }
    
    .completion-radio label {
      cursor: pointer;
      margin: 0;
      flex-grow: 1;
    }
    
    .reflection-area {
      margin-top: 12px;
      display: none;
    }
    
    .reflection-area.show {
      display: block;
    }
    
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
    }
    
    textarea:focus {
      outline: none;
      border-color: #51cf66;
    }
    
    .reflection-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
      display: block;
    }
    
    button {
      background: #4a9eff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      width: 100%;
      margin-top: 10px;
    }
    
    button:hover {
      background: #3a8eef;
    }
    
    .button-secondary {
      background: #e0e0e0;
      color: #333;
      margin-top: 0;
    }
    
    .button-secondary:hover {
      background: #d0d0d0;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }
    
    .info-box {
      background: #f0f7ff;
      border: 2px solid #4a9eff;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .info-box p {
      margin: 0;
      color: #333;
      font-size: 14px;
      line-height: 1.5;
    }
    
    .token-note {
      color: #4a9eff;
      font-weight: 500;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>✓ Check In</h1>
  <p class="subtitle">Review your systems and reflect on your progress</p>
  
  <div class="info-box" id="tokenInfo">
    <p>Mark your systems as complete, or reflect on why you didn't complete them.</p>
    <p class="token-note" id="tokenMessage"></p>
  </div>
  
  <div class="systems-section">
    <h2>Your Systems</h2>
    <div id="systemsList">
      <!-- Systems will be populated here -->
    </div>
  </div>
  
  <div class="button-group">
    <button class="button-secondary" id="cancelBtn">Cancel</button>
    <button id="saveBtn" style="flex: 2;">Save Check-In</button>
  </div>
  
  <script src="firebase-config.js"></script>
  <script src="checkin.js"></script>
</body>
</html>
