<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Purchase Complete – Eudaimonia</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #333; margin: 0 0 12px; font-size: 28px; }
    p  { color: #666; line-height: 1.6; margin: 0 0 10px; }
    .note {
      background: #f0f7ff;
      border: 2px solid #4a9eff;
      border-radius: 8px;
      padding: 15px;
      margin-top: 24px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Purchase complete!</h1>
    <p>Your tokens are on their way.</p>
    <p>Open the Eudaimonia extension popup and they'll appear automatically.</p>
    <div class="note">
      💡 Tokens are credited the next time you open the extension. You can close this tab.
    </div>
  </div>
</body>
</html>
