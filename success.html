<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Purchase Complete – Eudaimonia</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #333; margin: 0 0 12px; font-size: 28px; }
    p  { color: #666; line-height: 1.6; margin: 0 0 10px; }
    .note {
      background: #f0f7ff;
      border: 2px solid #4a9eff;
      border-radius: 8px;
      padding: 15px;
      margin-top: 24px;
      font-size: 14px;
      color: #333;
    }
    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #51cf66;
      font-weight: 600;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Purchase complete!</h1>
    <p>Your tokens are on their way.</p>
    <p>Open the Eudaimonia extension popup and they'll appear automatically.</p>
    <div class="note">
      💡 Tokens are credited the next time you open the extension. You can close this tab.
    </div>
    <div class="status" id="status"></div>
  </div>

  <script>
    // Grab the Stripe session ID from the URL and post it to the extension via content.js
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    if (sessionId) {
      // content.js is listening for this message on this origin
      window.postMessage({ type: 'EUDAIMONIA_PURCHASE', sessionId: sessionId }, '*');
      document.getElementById('status').textContent = '✓ Extension notified – open the popup to see your tokens!';
    } else {
      document.getElementById('status').textContent = 'Session not found – contact support if tokens don\'t appear.';
    }
  </script>
</body>
</html>
